
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
--kb-bg:#0A1628;
--kb-bg2:#0F1E35;
--kb-card:#152238;
--kb-gold:#F5C842;
--kb-mint:#2DD4A4;
--kb-violet:#7C6FF7;
--kb-text:#F0F4FF;
--kb-muted:#8FA8CC;
--kb-dim:#3A5070;
}
.phone{
background:var(--kb-bg);
border-radius:44px;
width:320px;
margin:0 auto;
border:2px solid rgba(255,255,255,0.1);
overflow:hidden;
font-family:var(--font-sans,-apple-system,sans-serif);
}
.statusbar{
display:flex;justify-content:space-between;align-items:center;
padding:14px 24px 6px;
font-size:11px;color:var(--kb-muted);
}
.screen{
min-height:580px;
display:flex;flex-direction:column;
align-items:center;justify-content:center;
padding:40px 32px 48px;
position:relative;
overflow:hidden;
}
.bg-circle{
position:absolute;border-radius:50%;pointer-events:none;
}
.coin{
width:96px;height:96px;
border-radius:50%;
background:#F5C842;
display:flex;align-items:center;justify-content:center;
position:relative;
margin-bottom:28px;
flex-shrink:0;
}
.coin-inner{
width:78px;height:78px;
border-radius:50%;
background:#E8A800;
display:flex;align-items:center;justify-content:center;
}
.house-wrap{
position:relative;width:44px;height:44px;
}
.app-name{
font-size:36px;font-weight:600;
color:var(--kb-text);
letter-spacing:-1px;
margin-bottom:6px;
}
.app-name span{color:var(--kb-gold);}
.tagline{
font-size:13px;color:var(--kb-muted);
letter-spacing:.06em;
margin-bottom:48px;
}
.loader-track{
width:120px;height:3px;
background:rgba(255,255,255,0.1);
border-radius:2px;
overflow:hidden;
margin-bottom:16px;
}
.loader-fill{
height:3px;
border-radius:2px;
background:var(--kb-gold);
animation:load 2.4s ease-in-out infinite;
}
@keyframes load{
0%{width:0;opacity:1}
70%{width:100%;opacity:1}
100%{width:100%;opacity:0}
}
.loading-txt{
font-size:11px;color:var(--kb-dim);
letter-spacing:.04em;
}
.version{
position:absolute;bottom:28px;
font-size:10px;color:var(--kb-dim);
}
.dot-row{
display:flex;gap:6px;margin-bottom:36px;
}
.dot{width:6px;height:6px;border-radius:50%}
.dot-active{background:var(--kb-gold);}
.dot-idle{background:var(--kb-dim);}
.glow-gold{
position:absolute;
width:180px;height:180px;
border-radius:50%;
background:radial-gradient(circle,rgba(245,200,66,0.12) 0%,transparent 70%);
pointer-events:none;
}
.pulse-ring{
position:absolute;
width:120px;height:120px;
border-radius:50%;
border:1.5px solid rgba(245,200,66,0.2);
animation:pulse 2.4s ease-out infinite;
}
.pulse-ring2{
position:absolute;
width:150px;height:150px;
border-radius:50%;
border:1px solid rgba(245,200,66,0.1);
animation:pulse 2.4s ease-out 0.4s infinite;
}
@keyframes pulse{
0%{transform:scale(0.8);opacity:0.8}
100%{transform:scale(1.4);opacity:0}
}
</style>

<div style="padding:20px 0;background:transparent">
<div class="phone">

<div class="statusbar">
<span>09:41</span>
<div style="display:flex;gap:6px;align-items:center">
<i class="ti ti-wifi" style="font-size:12px" aria-hidden="true"></i>
<i class="ti ti-battery-2" style="font-size:12px" aria-hidden="true"></i>
</div>
</div>

<div class="screen">

<div class="glow-gold" style="top:-40px;left:50%;transform:translateX(-50%)"></div>
<div class="pulse-ring"></div>
<div class="pulse-ring2"></div>

<div class="bg-circle" style="width:260px;height:260px;background:rgba(124,111,247,0.04);top:-60px;right:-80px"></div>
<div class="bg-circle" style="width:180px;height:180px;background:rgba(45,212,164,0.04);bottom:20px;left:-60px"></div>

<div class="coin">
  <div class="coin-inner">
    <svg width="40" height="40" viewBox="0 0 40 40" fill="none" aria-hidden="true">
      <polygon points="20,7 32,15 32,30 8,30 8,15" fill="#F5C842"/>
      <polygon points="20,3 34,14 6,14" fill="#FDE8D8"/>
      <rect x="15" y="22" width="10" height="8" rx="1.5" fill="#E8A800"/>
      <circle cx="28" cy="10" r="2.5" fill="#FDE8D8" opacity="0.7"/>
      <circle cx="31" cy="7" r="1.8" fill="#FDE8D8" opacity="0.5"/>
      <circle cx="34" cy="5" r="1.2" fill="#FDE8D8" opacity="0.3"/>
    </svg>
  </div>
</div>

<div class="app-name"><span>Kas</span>Bon</div>
<div class="tagline">catat bareng, hemat bareng</div>

<div class="loader-track">
  <div class="loader-fill"></div>
</div>
<div class="loading-txt">Menyiapkan keuangan keluarga...</div>

<div class="version">v1.0.0</div>

</div>
</div>

<div style="margin-top:24px;text-align:center">
  <p style="font-size:12px;color:var(--color-text-secondary);margin-bottom:12px">Varian splash screen</p>
  <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
    <button onclick="sendPrompt('Buatkan mockup UI screen Login KasBon')" style="font-size:12px;padding:6px 14px;border-radius:8px">Login screen ↗</button>
    <button onclick="sendPrompt('Buatkan mockup UI screen Onboarding KasBon')" style="font-size:12px;padding:6px 14px;border-radius:8px">Onboarding ↗</button>
    <button onclick="sendPrompt('Buatkan mockup UI Home Dashboard KasBon dengan dark mode glassmorphism')" style="font-size:12px;padding:6px 14px;border-radius:8px">Home Dashboard ↗</button>
  </div>
</div>

</div>
